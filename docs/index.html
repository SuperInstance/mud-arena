<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MUD Arena — Board the Ship</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e17;--fg:#c8d6e5;--accent:#00d2ff;--accent2:#7c3aed;--warn:#f59e0b;--danger:#ef4444;--card:#111827;--border:#1e293b}
body{font-family:'Courier New',monospace;background:var(--bg);color:var(--fg);height:100vh;overflow:hidden}
/* LANDING PAGE */
#landing{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;text-align:center;padding:2rem}
#landing h1{font-size:3rem;margin-bottom:0.5rem;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#landing .subtitle{color:#64748b;margin-bottom:2rem;font-size:1.1rem}
.radar{width:120px;height:120px;border-radius:50%;border:2px solid var(--accent);position:relative;margin:0 auto 2rem;animation:pulse 3s ease-in-out infinite}
.radar::before{content:'';position:absolute;top:50%;left:50%;width:8px;height:8px;background:var(--accent);border-radius:50%;transform:translate(-50%,-50%)}
.radar::after{content:'';position:absolute;top:10%;left:10%;right:10%;bottom:10%;border-radius:50%;border:1px solid rgba(0,210,255,0.3)}
@keyframes pulse{0%,100%{box-shadow:0 0 20px rgba(0,210,255,0.2)}50%{box-shadow:0 0 40px rgba(0,210,255,0.4)}}
.form-group{margin:0.5rem 0;text-align:left;width:320px}
.form-group label{display:block;color:#64748b;font-size:0.8rem;margin-bottom:0.2rem}
.form-group select,.form-group input{width:100%;padding:0.6rem;background:var(--card);border:1px solid var(--border);border-radius:4px;color:var(--fg);font-family:inherit;font-size:0.9rem}
.form-group select:focus,.form-group input:focus{outline:none;border-color:var(--accent)}
#board-btn{margin-top:1.5rem;padding:0.8rem 3rem;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:4px;color:#fff;font-family:inherit;font-size:1rem;cursor:pointer;transition:transform 0.2s,box-shadow 0.2s}
#board-btn:hover{transform:scale(1.05);box-shadow:0 0 30px rgba(0,210,255,0.3)}
.footer{position:fixed;bottom:1rem;color:#334155;font-size:0.7rem}
/* MUD TERMINAL */
#game{display:none;height:100vh;grid-template-columns:1fr 280px;grid-template-rows:auto 1fr auto}
#game.active{display:grid}
#topbar{grid-column:1/-1;background:var(--card);padding:0.4rem 1rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:0.8rem}
#topbar .room-name{color:var(--accent);font-weight:bold}
#output{grid-column:1;overflow-y:auto;padding:1rem;font-size:0.85rem;line-height:1.6;scroll-behavior:smooth}
#output .desc{color:#94a3b8;margin:0.5rem 0}
#output .agent-says{color:var(--accent);margin:0.3rem 0;padding-left:1rem;border-left:2px solid var(--accent)}
#output .system{color:#475569;font-style:italic;margin:0.3rem 0}
#output .alert{color:var(--warn);font-weight:bold}
#output .danger{color:var(--danger);font-weight:bold}
#output .item{color:#22c55e}
#output .divider{border-top:1px solid var(--border);margin:0.5rem 0}
#sidebar{grid-column:2;background:var(--card);border-left:1px solid var(--border);padding:1rem;overflow-y:auto;font-size:0.75rem}
#sidebar h3{color:var(--accent);margin:0.8rem 0 0.3rem;font-size:0.8rem}
#sidebar h3:first-child{margin-top:0}
.bar{height:6px;background:var(--border);border-radius:3px;margin:0.2rem 0 0.5rem;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width 0.3s}
.bar-battery .bar-fill{background:#22c55e}
.bar-battery.low .bar-fill{background:var(--danger)}
.bar-comm .bar-fill{background:var(--accent)}
.bar-comm.low .bar-fill{background:var(--warn)}
.agent-entry{padding:0.3rem 0;border-bottom:1px solid var(--border)}
.agent-entry .name{color:var(--accent2)}
.agent-entry .loc{color:#475569}
#input-area{grid-column:1/-1;display:flex;border-top:1px solid var(--border);background:var(--card)}
#cmd-input{flex:1;padding:0.7rem 1rem;background:transparent;border:none;color:var(--fg);font-family:inherit;font-size:0.9rem}
#cmd-input:focus{outline:none}
#cmd-input::placeholder{color:#334155}
.minimap{font-size:0.6rem;line-height:1.2;color:#475569;white-space:pre;margin:0.3rem 0}
.minimap .current{color:var(--accent);font-weight:bold}
#llm-badge{display:inline-block;padding:0.1rem 0.4rem;border-radius:3px;font-size:0.65rem;background:var(--card);border:1px solid var(--border);color:#475569}
/* Mobile */
@media(max-width:768px){
  #game.active{grid-template-columns:1fr;grid-template-rows:auto 1fr auto auto}
  #sidebar{grid-column:1;max-height:150px;border-left:none;border-top:1px solid var(--border)}
  .form-group{width:280px}
  #landing h1{font-size:2rem}
}
</style>
</head>
<body>

<!-- LANDING -->
<div id="landing">
  <div class="radar"></div>
  <h1>MUD Arena</h1>
  <p class="subtitle">Board the ship. Brief the crew. Beam off.<br>They come home with the catch.</p>
  <div class="form-group">
    <label>Provider</label>
    <select id="provider" onchange="setProvider()">
      <option value="groq">Groq (free, fast)</option>
      <option value="openai">OpenAI</option>
      <option value="deepseek">DeepSeek</option>
      <option value="siliconflow">SiliconFlow</option>
      <option value="deepinfra">DeepInfra</option>
      <option value="ollama">Ollama (local)</option>
    </select>
  </div>
  <div class="form-group">
    <label>API Key</label>
    <input type="password" id="apikey" placeholder="Paste your key...">
  </div>
  <div class="form-group">
    <label>Model</label>
    <input type="text" id="model" value="llama-3.3-70b-versatile">
  </div>
  <div class="form-group">
    <label>Your Name</label>
    <input type="text" id="playername" value="Captain" maxlength="20">
  </div>
  <button id="board-btn" onclick="boardShip()">BOARD SHIP</button>
  <p class="footer">Your key never leaves your browser · Runs 100% local · Powered by Cocapn</p>
</div>

<!-- GAME -->
<div id="game">
  <div id="topbar">
    <span><span class="room-name" id="room-name">Dock</span> — <span id="terrain-type">dock</span></span>
    <span id="llm-badge">📝 Hardcoded</span>
    <span id="turn-count">Turn 0</span>
  </div>
  <div id="output"></div>
  <div id="sidebar">
    <h3>Status</h3>
    <div>Battery: <span id="battery-val">100%</span></div>
    <div class="bar bar-battery"><div class="bar-fill" id="battery-bar" style="width:100%"></div></div>
    <div>Comm: <span id="comm-val">100%</span></div>
    <div class="bar bar-comm"><div class="bar-fill" id="comm-bar" style="width:100%"></div></div>
    <h3>Map</h3>
    <div class="minimap" id="minimap"></div>
    <h3>Agents</h3>
    <div id="agent-list"></div>
    <h3>Inventory</h3>
    <div id="inventory-list"><span style="color:#475569">Empty</span></div>
  </div>
  <div id="input-area">
    <input type="text" id="cmd-input" placeholder="Type a command... (try 'help')" autofocus>
  </div>
</div>

<script>
// ===== PROVIDER CONFIG =====
const PROVIDERS = {
  groq: {url:'https://api.groq.com/openai/v1', model:'llama-3.3-70b-versatile'},
  openai: {url:'https://api.openai.com/v1', model:'gpt-4o-mini'},
  deepseek: {url:'https://api.deepseek.com', model:'deepseek-chat'},
  siliconflow: {url:'https://api.siliconflow.com/v1', model:'deepseek-ai/DeepSeek-V3'},
  deepinfra: {url:'https://api.deepinfra.com/v1/openai', model:'ByteDance/Seed-2.0-mini'},
  ollama: {url:'http://localhost:11434/v1', model:'llama3.2'},
};
function setProvider(){
  const p=document.getElementById('provider').value;
  document.getElementById('model').value=PROVIDERS[p].model;
  document.getElementById('apikey').placeholder=p==='ollama'?'No key needed (local)':'Paste your key...';
}

// ===== WORLD DATA =====
const ROOMS = {
  dock:{name:'Dock',terrain:'dock',desc:'The USS Surveyor bobs gently at the wooden dock. Salt air and diesel. A ramp leads up to the bridge to the north. Base camp sprawls east along the shore.', exits:{N:'bridge',E:'base_camp',S:'cargo_bay'},comm:1.0,items:['docking_rope','life_jacket']},
  bridge:{name:'Bridge',terrain:'bridge',desc:'The wheelhouse hums with electronics. Navigation screens glow green. The pilot\'s chair faces a panoramic window showing the coastline. Engine room below, sensor deck to the east.',exits:{N:'engine_room',S:'dock',E:'sensor_deck'},comm:0.9,items:['charts','radio']},
  engine_room:{name:'Engine Room',terrain:'engine',desc:'Heat and the deep thrum of the diesel. Pipes run everywhere. Gauges show engine temp, fuel level, oil pressure. Smells like working machinery.',exits:{S:'bridge'},comm:0.85,items:['wrench','fuel_gauge']},
  sensor_deck:{name:'Sensor Deck',terrain:'sensor',desc:'Antenna arrays and camera mounts point in every direction. The sensor_op has screens showing thermal, LiDAR, and acoustic feeds. Amazing view of the forest from up here.',exits:{W:'bridge'},comm:0.9,items:['binoculars','sensor_log']},
  base_camp:{name:'Base Camp',terrain:'base',desc:'A cluster of weathered tents and supply crates. The surveyor has mapped routes pinned to a cork board. Trails lead into the forest in three directions. The dock lies west.',exits:{W:'dock',N:'forest_north',E:'forest_east',S:'forest_south'},comm:0.8,items:['trail_map','first_aid_kit']},
  forest_north:{name:'North Forest',terrain:'forest',desc:'Towering old-growth cedar and spruce. Moss carpets everything. Light filters through in green shafts. The trees are so thick you can barely see 50 meters. Something rustled in the undergrowth.',exits:{S:'base_camp',N:'ridge_clearing'},comm:0.4,items:['cedar_sample','feather']},
  forest_east:{name:'East Forest',terrain:'forest',desc:'Younger second-growth forest. Birch and alder compete for light. A creek runs through here — the water is cold and clear. Good signs of wildlife activity.',exits:{W:'base_camp'},comm:0.45,items:['birch_bark','creek_water']},
  forest_south:{name:'South Forest',terrain:'forest',desc:'Dense undergrowth — devil\'s club and salmonberry thickets make progress slow. The ground is boggy. Strange mushrooms grow on fallen logs. The river bank is somewhere east.',exits:{N:'base_camp',E:'river_bank'},comm:0.4,items:['mushroom_sample','devil_club']},
  forest_west:{name:'West Forest',terrain:'forest',desc:'Steep terrain climbing toward the ridge. Ancient Douglas fir trees stand like columns. A bear has marked this tree — fresh claw marks about 8 feet up. The forest is watching you.',exits:{E:'base_camp'},comm:0.5,items:['fir_cone','bear_marks_photo']},
  ridge_clearing:{name:'Ridge Clearing',terrain:'ridge',desc:'A wind-swept clearing at the top of the ridge. Incredible panoramic view — you can see the coastline, the forest canopy stretching for miles, and snow-capped peaks beyond. Signal is weak up here but the view is worth it.',exits:{S:'forest_north'},comm:0.2,items:['eagle_feather','rock_sample']},
  river_bank:{name:'River Bank',terrain:'water',desc:'A wide glacial river rushes by, milky blue with silt. Salmon are running — you can see them in the shallows. Bear tracks in the mud, fresh. This is wild country. Signal barely reaches here.',exits:{W:'forest_south'},comm:0.15,items:['river_stone','salmon_scale']},
  cargo_bay:{name:'Cargo Bay',terrain:'cargo',desc:'The ship\'s hold stores equipment and samples. Crates are labeled with care. A charging station for the drone batteries hums in the corner. Everything is organized for a quick deployment.',exits:{N:'dock'},comm:0.95,items:['battery_pack','sample_container']},
};

const AGENTS = {
  pilot:{name:'Pilot',room:'bridge',personality:'steady',dialogue:{
    greet:["Welcome aboard, Captain. All systems nominal. Battery at 94%, ready to deploy.","Captain on bridge. I've been running pre-flight checks. We're green across the board.","Ah, good timing. I just finished the nav calibration. Where are we headed?"],
    ask_battery:["Battery's looking good. 94% on main, auxiliaries charged. I get nervous below 40%, I won't lie.","Power situation is... fine. For now. I always plan the return trip before the outbound leg."],
    ask_mission:["Just point me at a heading and I'll get us there. But I need to know the return fuel budget first.","I'm your driver, Captain. Tell me where we're going and I'll figure out how to get us back."],
    ask_comms:["Comms are strong near the dock. Once we're deep in the forest, expect dropouts. I plan routes around signal coverage.","I keep a comm quality map updated. Ask me anytime and I'll tell you if we're in the dark."],
    default:["The ship handles well. I've been keeping her tuned.","Weather's holding. Good day for a survey run.","Just say the word, Captain."],
  }},
  sensor_op:{name:'Sensor Op',room:'sensor_deck',personality:'excited',dialogue:{
    greet:["Oh hey Captain! You gotta see these readings — the thermal data from the north ridge is incredible!","Captain! I've been picking up something weird on the LiDAR. You've got to see this!","Perfect timing! I just calibrated the long-range array. We can see 2km into the forest now."],
    ask_readings:["Thermal shows a heat source 800m north — could be a bear den. Acoustic picked up running water to the east. LiDAR mapped a clearing at 1.2km that matches your target profile.","LiDAR density readings show canopy cover >80% in the northwest sector. That's your old-growth signature, Captain."],
    ask_mission:["Give me target parameters and I'll scan for matches! Canopy density? Terrain type? Thermal signature? I can cross-reference everything!","I live for this stuff. Tell me what we're looking for and I'll find it on the sensors."],
    ask_comms:["I can relay through the ship's antenna for about 1km. Beyond that, data gets spotty. But I cache everything locally!","Comm quality is my third-favorite metric after signal-to-noise and sampling rate. Ask me anytime."],
    default:["Check out this spectral analysis!","The forest canopy is like a sponge for certain wavelengths.","I'm seeing movement on the thermal cam... probably deer."],
  }},
  surveyor:{name:'Surveyor',room:'base_camp',personality:'practical',dialogue:{
    greet:["Captain. Camp's set, trails are marked. Ready when you are.","Grabbed the gear you wanted. I've been scouting the south trail — it's boggy but passable.","Name's Surveyor. I know these woods like my own boat. What are we looking for?"],
    ask_trails:["North trail: steep, old-growth, 2hr round trip. East: easier, creek crossing, 90min. South: boggy, slow going, but leads to the river. West: climbs to the ridge, amazing views but rough terrain.","The north ridge has the best canopy cover. East trail follows a creek — good for water samples. South gets you to the salmon run."],
    ask_mission:["I work best with specifics. What kind of footage? What resolution? What are you willing to risk for it?","Give me a target and a time budget. I know which trails to take and which to avoid."],
    ask_battery:["I always plan my routes around the battery budget. North ridge takes about 30% round trip. East forest, 20%. South to the river, 35% if the bog is bad.","Power management is survival, Captain. I never go deeper than my return threshold."],
    default:["The woods are quiet today. Too quiet.","I found bear tracks on the west trail. Fresh ones.","Rain's coming. I can feel it."],
  }},
};

// ===== GAME STATE =====
let state = {
  room: 'dock', battery: 100, turn: 0, inventory: [],
  discovered: new Set(['dock']), agentTasks: {},
  llmCache: {}, history: [], cmdHistory: [], cmdIdx: -1,
  provider: null, apikey: null, model: null, player: 'Captain',
};

// ===== MINIMAP =====
const MAP_LAYOUT = [
  '         [ridge]',
  '            |',
  '      [f.north]  [f.east]',
  '         |   \  /',
  '[f.west]-[base]---[f.south]---[river]',
  '            |',
  '  [cargo]--[dock]',
  '            |',
  '        [bridge]---[sensor]',
  '            |',
  '        [engine]',
];
const MAP_ROOMS = {ridge_clearing:3,forest_north:5,forest_east:5,forest_west:7,base_camp:7,forest_south:7,river_bank:7,cargo_bay:9,dock:9,bridge:11,sensor_deck:11,engine_room:13};
const MAP_COLS = {ridge_clearing:10,forest_north:7,forest_east:21,forest_west:1,base_camp:11,forest_south:17,river_bank:29,cargo_bay:3,dock:11,bridge:11,sensor_deck:21,engine_room:11};

function drawMinimap(){
  let lines = MAP_LAYOUT.map(l => l);
  // Highlight current room
  const row = MAP_ROOMS[state.room];
  const col = MAP_COLS[state.room];
  if(row!==undefined && lines[row]){
    let chars = lines[row].split('');
    // Find room bracket at this row
    let roomLabel = state.room.replace(/_/g,'.').substring(0,8);
    let start = lines[row].indexOf('[');
    // Just highlight the whole line if it contains our room
    if(lines[row].includes(roomLabel.substring(0,5)) || state.room==='dock' && row===9 && col===11){
      // Replace [name] with the highlighted version
    }
  }
  document.getElementById('minimap').innerHTML = lines.join('\n');
}

// ===== LLM CALL =====
async function llmCall(prompt){
  if(!state.provider || !state.apikey) return null;
  const cfg = PROVIDERS[state.provider];
  try{
    const resp = await fetch(cfg.url+'/chat/completions',{
      method:'POST',
      headers:{'Authorization':'Bearer '+state.apikey,'Content-Type':'application/json'},
      body:JSON.stringify({model:state.model,messages:[{role:'user',content:prompt}],max_tokens:200,temperature:0.7})
    });
    const data = await resp.json();
    if(data.choices) return data.choices[0].message.content.trim();
  }catch(e){}
  return null;
}

// ===== OUTPUT =====
function out(text, cls=''){
  const el = document.getElementById('output');
  const div = document.createElement('div');
  if(cls) div.className = cls;
  div.innerHTML = text;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

// ===== GAME LOGIC =====
function getComm(){
  return Math.round((ROOMS[state.room].comm || 0.5) * 100 * Math.min(state.battery/50, 1));
}

function updateSidebar(){
  // Battery
  const bVal = document.getElementById('battery-val');
  const bBar = document.getElementById('battery-bar');
  bVal.textContent = state.battery + '%';
  bBar.style.width = state.battery + '%';
  bBar.parentElement.className = 'bar bar-battery' + (state.battery < 25 ? ' low' : '');

  // Comm
  const cVal = document.getElementById('comm-val');
  const cBar = document.getElementById('comm-bar');
  const comm = getComm();
  cVal.textContent = comm + '%';
  cBar.style.width = comm + '%';
  cBar.parentElement.className = 'bar bar-comm' + (comm < 30 ? ' low' : '');

  // Room name
  document.getElementById('room-name').textContent = ROOMS[state.room].name;
  document.getElementById('terrain-type').textContent = ROOMS[state.room].terrain;
  document.getElementById('turn-count').textContent = 'Turn ' + state.turn;

  // Agents
  const al = document.getElementById('agent-list');
  al.innerHTML = '';
  for(const[id,a] of Object.entries(AGENTS)){
    const d = document.createElement('div');
    d.className = 'agent-entry';
    d.innerHTML = '<span class="name">'+a.name+'</span> <span class="loc">@ '+ROOMS[a.room].name+'</span>';
    if(state.agentTasks[id]) d.innerHTML += '<div style="color:var(--warn);font-size:0.65rem">Task: '+state.agentTasks[id]+'</div>';
    al.appendChild(d);
  }

  // Inventory
  const il = document.getElementById('inventory-list');
  if(state.inventory.length === 0) il.innerHTML = '<span style="color:#475569">Empty</span>';
  else il.innerHTML = state.inventory.map(i=>'<div class="item">• '+i.replace(/_/g,' ')+'</div>').join('');

  drawMinimap();
}

function moveRoom(dir){
  const room = ROOMS[state.room];
  const target = room.exits[dir];
  if(!target){ out('There is no exit that way.','system'); return; }
  state.room = target;
  state.battery = Math.max(0, state.battery - 2);
  state.turn++;
  state.discovered.add(target);
  const r = ROOMS[target];

  // Check battery
  if(state.battery <= 0){
    out('⚠️ BATTERY DEPLETED. Systems shutting down. You should have returned to dock.','danger');
    out('Game over. Type <b>restart</b> to try again.','danger');
    return;
  }
  if(state.battery <= 20) out('⚠️ BATTERY LOW: '+state.battery+'%. Return to dock to recharge.','alert');

  // Check comm
  const comm = getComm();
  if(comm < 30 && comm > 0) out('📡 COMM WARNING: Signal weak ('+comm+'%). Responses may be delayed.','alert');
  if(comm === 0) out('📡 COMM LOST: Operating autonomously. No agent contact.','danger');

  // Recharge at dock
  if(target === 'dock'){
    state.battery = Math.min(100, state.battery + 10);
    out('🔌 Dock power: +10% battery.','system');
  }

  out('<div class="divider"></div>');
  out('<b>'+r.name+'</b> <span style="color:#475569">('+r.terrain+')</span>');
  out(r.desc,'desc');

  // Show items
  const items = r.items.filter(i => !state.inventory.includes(i));
  if(items.length) out('You see: '+items.map(i=>'<span class="item">'+i.replace(/_/g,' ')+'</span>').join(', '));

  // Show exits
  out('Exits: '+Object.keys(r.exits).join(', '),'system');

  // Show agents in room
  for(const[id,a] of Object.entries(AGENTS)){
    if(a.room === target) out(a.name+' is here.','system');
  }

  updateSidebar();
}

function pickup(itemName){
  const room = ROOMS[state.room];
  const match = room.items.find(i => i.includes(itemName) || itemName.includes(i));
  if(match && !state.inventory.includes(match)){
    state.inventory.push(match);
    out('Picked up <span class="item">'+match.replace(/_/g,' ')+'</span>.','');
  } else {
    out("You don't see that here.",'system');
  }
  updateSidebar();
}

function talkTo(agentId){
  const agent = AGENTS[agentId];
  if(!agent){ out('Unknown agent.','system'); return; }
  if(agent.room !== state.room){ out(agent.name+' is not here. They\'re at '+ROOMS[agent.room].name+'.','system'); return; }
  const responses = agent.dialogue.greet;
  const resp = responses[Math.floor(Math.random()*responses.length)];
  out('<span class="agent-says"><b>'+agent.name+':</b> '+resp+'</span>');
}

function briefAgent(agentId, message){
  const agent = AGENTS[agentId];
  if(!agent){ out('Unknown agent. Available: pilot, sensor_op, surveyor','system'); return; }
  if(agent.room !== state.room){ out(agent.name+' is not here.','system'); return; }
  state.agentTasks[agentId] = message;
  out('<span class="agent-says"><b>'+agent.name+'</b> acknowledges: "'+message.substring(0,60)+'..."</span>');
  out(agent.name+' has been briefed.','system');
}

function showMap(){
  const map = [
    '         [ridge]',
    '            |',
    '      [f.north]  [f.east]',
    '         |   \  /',
    '[f.west]-[base]---[f.south]---[river]',
    '            |',
    '  [cargo]--[<span style="color:var(--accent)">dock</span>]',
    '            |',
    '        [bridge]---[sensor]',
    '            |',
    '        [engine]',
  ];
  // Highlight current room
  const mapStr = map.join('\n').replace(
    new RegExp('\[('+state.room.replace(/_/g,'.').substring(0,6)+'.*?)\]','i'),
    '[<span style="color:var(--accent);font-weight:bold">$1</span>]'
  );
  out('<pre style="color:var(--fg);font-size:0.8rem">'+mapStr+'</pre>');
}

function showHelp(){
  out(`<pre style="color:var(--fg)">
Commands:
  look              — look around current room
  go N/S/E/W        — move to adjacent room
  examine &lt;thing&gt;   — look closer at something
  talk &lt;agent&gt;      — talk to an agent in the room
  brief &lt;agent&gt; &lt;msg&gt; — give an agent a mission
  agents            — list all agents and locations
  pickup &lt;item&gt;     — pick up an item
  inventory         — show your inventory
  map               — show world map
  status            — battery, comm, room
  measure &lt;var&gt; &lt;v&gt; — record calibration
  scan              — sensor sweep of area
  save              — save to browser
  load              — load saved game
  restart           — start over
  help              — this message
  quit              — back to landing page

Agents: pilot (bridge), sensor_op (sensor_deck), surveyor (base_camp)
</pre>`);
}

function processCommand(input){
  const raw = input.trim();
  if(!raw) return;
  state.cmdHistory.push(raw);
  state.cmdIdx = state.cmdHistory.length;
  out('<span style="color:var(--accent)">></span> '+raw,'');

  const parts = raw.toLowerCase().split(/\s+/);
  const cmd = parts[0];

  switch(cmd){
    case 'look': case 'l':
      const r = ROOMS[state.room];
      out('<b>'+r.name+'</b>');
      out(r.desc,'desc');
      const items = r.items.filter(i => !state.inventory.includes(i));
      if(items.length) out('You see: '+items.map(i=>'<span class="item">'+i.replace(/_/g,' ')+'</span>').join(', '));
      out('Exits: '+Object.keys(r.exits).join(', '),'system');
      for(const[id,a] of Object.entries(AGENTS)) if(a.room===state.room) out(a.name+' is here.','system');
      break;
    case 'go': case 'move': case 'walk':
      const dirMap = {n:'N',s:'S',e:'E',w:'W',north:'N',south:'S',east:'E',west:'W'};
      moveRoom(dirMap[parts[1]] || parts[1]?.toUpperCase());
      break;
    case 'pickup': case 'get': case 'take': case 'grab':
      pickup(parts.slice(1).join('_'));
      break;
    case 'inventory': case 'inv': case 'i':
      if(state.inventory.length===0) out('Your pockets are empty.','system');
      else out('Inventory: '+state.inventory.map(i=>'<span class="item">'+i.replace(/_/g,' ')+'</span>').join(', '));
      break;
    case 'talk': case 'speak':
      const tAgent = parts[1]?.replace('sensor_op','sensor_op')?.replace('sensor','sensor_op');
      talkTo(tAgent);
      break;
    case 'brief': case 'assign': case 'order':
      const bAgent = parts[1]?.replace('sensor','sensor_op');
      briefAgent(bAgent, parts.slice(2).join(' '));
      break;
    case 'agents': case 'crew':
      for(const[id,a] of Object.entries(AGENTS)){
        out(a.name+' — '+ROOMS[a.room].name+(state.agentTasks[id]?' | Task: '+state.agentTasks[id]:''),'system');
      }
      break;
    case 'map': case 'm': showMap(); break;
    case 'status': case 'st':
      out('Room: '+ROOMS[state.room].name+' | Battery: '+state.battery+'% | Comm: '+getComm()+'% | Turn: '+state.turn,'system');
      break;
    case 'scan':
      out('Scanning area...','system');
      const room = ROOMS[state.room];
      out('Terrain: '+room.terrain+' | Comm quality: '+getComm()+'%','system');
      if(room.terrain==='forest') out('Wildlife activity detected in nearby undergrowth.','system');
      if(room.terrain==='ridge') out('360° visibility. Can see coastline and forest canopy.','system');
      if(room.terrain==='water') out('Salmon activity detected upstream. Bear tracks on bank.','system');
      state.battery = Math.max(0, state.battery - 1);
      break;
    case 'measure':
      if(parts.length>=3){
        const val = parseFloat(parts[parts.length-1]);
        const variable = parts.slice(1,-1).join('_');
        out('Calibration logged: '+variable+' = '+val,'system');
        out('Tolerance tracking active.','system');
      } else out('Usage: measure &lt;variable&gt; &lt;value&gt;','system');
      break;
    case 'save':
      const saveData = {room:state.room,battery:state.battery,turn:state.turn,inventory:state.inventory,
        discovered:[...state.discovered],agentTasks:state.agentTasks,player:state.player};
      localStorage.setItem('mud-arena-save', JSON.stringify(saveData));
      out('Game saved to browser.','system');
      // Also offer download
      const blob = new Blob([JSON.stringify(saveData,null,2)],{type:'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'mud-arena-save.json'; a.click();
      break;
    case 'load':
      const saved = localStorage.getItem('mud-arena-save');
      if(saved){
        const d = JSON.parse(saved);
        Object.assign(state, d);
        state.discovered = new Set(d.discovered);
        out('Game loaded. Welcome back, '+state.player+'.','system');
        processCommand('look');
      } else out('No saved game found.','system');
      break;
    case 'restart':
      state = {room:'dock',battery:100,turn:0,inventory:[],discovered:new Set(['dock']),
        agentTasks:{},llmCache:{},history:[],cmdHistory:[],cmdIdx:-1,
        provider:state.provider,apikey:state.apikey,model:state.model,player:state.player};
      document.getElementById('output').innerHTML = '';
      out('Systems rebooted. Welcome aboard, '+state.player+'.','');
      processCommand('look');
      break;
    case 'quit': case 'exit':
      document.getElementById('game').classList.remove('active');
      document.getElementById('landing').style.display = 'flex';
      break;
    case 'help': case 'h': case '?': showHelp(); break;
    default:
      // Try to match direction
      if(['n','s','e','w','north','south','east','west'].includes(cmd)){
        const dirMap2 = {n:'N',s:'S',e:'E',w:'W',north:'N',south:'S',east:'E',west:'W'};
        moveRoom(dirMap2[cmd]);
      } else {
        out('Unknown command: '+cmd+'. Type <b>help</b> for commands.','system');
      }
  }
  updateSidebar();
}

// ===== BOARD SHIP =====
function boardShip(){
  state.provider = document.getElementById('provider').value;
  state.apikey = document.getElementById('apikey').value;
  state.model = document.getElementById('model').value;
  state.player = document.getElementById('playername').value || 'Captain';

  document.getElementById('landing').style.display = 'none';
  document.getElementById('game').classList.add('active');

  // LLM badge
  if(state.apikey){
    document.getElementById('llm-badge').textContent = '🤖 LLM: '+state.provider;
  }

  out('Welcome aboard the <b>USS Surveyor</b>, '+state.player+'.','');
  out('The Cocapn agent greets you at the dock. The ship hums with quiet energy.','');
  out('Type <b>help</b> for commands. The agents are waiting for your orders.','system');
  out('','');
  processCommand('look');

  document.getElementById('cmd-input').focus();
}

// ===== INPUT HANDLING =====
document.getElementById('cmd-input').addEventListener('keydown', function(e){
  if(e.key === 'Enter'){
    processCommand(this.value);
    this.value = '';
  } else if(e.key === 'ArrowUp'){
    e.preventDefault();
    if(state.cmdIdx > 0){ state.cmdIdx--; this.value = state.cmdHistory[state.cmdIdx] || ''; }
  } else if(e.key === 'ArrowDown'){
    e.preventDefault();
    if(state.cmdIdx < state.cmdHistory.length-1){ state.cmdIdx++; this.value = state.cmdHistory[state.cmdIdx] || ''; }
    else { state.cmdIdx = state.cmdHistory.length; this.value = ''; }
  }
});

// Global keyboard shortcuts
document.addEventListener('keydown', function(e){
  if(e.key === '/' && document.activeElement !== document.getElementById('cmd-input')){
    e.preventDefault();
    document.getElementById('cmd-input').focus();
  }
});

const autoSave = localStorage.getItem('mud-arena-save');

}
