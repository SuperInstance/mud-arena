<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MUD Arena</title>
<style>
    body,html{margin:0;padding:0;height:100%;font-family:Arial,Helvetica,sans-serif;background:#111;color:#eee;}
    /* Landing */
    #landing{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;background:#0d0d0d;}
    .logo{position:relative;width:120px;height:120px;margin:20px;}
    .logo div{position:absolute;border:4px solid #0ff;border-radius:50%;animation:spin 6s linear infinite;}
    .logo div:nth-child(1){width:120px;height:120px;top:0;left:0;}
    .logo div:nth-child(2){width:90px;height:90px;top:15px;left:15px;}
    .logo div:nth-child(3){width:60px;height:60px;top:30px;left:30px;}
    @keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
    #boardBtn{padding:12px 24px;margin-top:20px;font-size:1.1rem;background:#0ff;color:#000;border:none;border-radius:8px;cursor:pointer;animation:glow 2s infinite;}
    @keyframes glow{0%{box-shadow:0 0 5px #0ff;}50%{box-shadow:0 0 20px #0ff;}100%{box-shadow:0 0 5px #0ff;}}
    footer{margin-top:40px;font-size:0.9rem;color:#777;}
    select,input{margin:5px;padding:8px;width:250px;border:none;border-radius:4px;}
    input[type="password"]{font-family:monospace;}
    /* Terminal */
    #terminal{display:none;flex-direction:row;height:100vh;}
    #output{flex:2;background:#000;padding:10px;overflow-y:auto;white-space:pre-wrap;font-family:"Courier New",monospace;}
    #status{flex:1;background:#111;padding:10px;display:flex;flex-direction:column;overflow-y:auto;}
    #cmdLine{display:flex;background:#222;padding:5px;}
    #cmdInput{flex:1;background:#111;color:#0f0;border:none;padding:5px;font-family:"Courier New",monospace;}
    #sendBtn{background:#0ff;color:#000;border:none;padding:5px 10px;margin-left:5px;cursor:pointer;}
    .bar{height:12px;background:#555;margin:4px 0;border-radius:4px;overflow:hidden;}
    .fill{height:100%;width:0;background:#0f0;}
    .red{background:#f00;}
    .yellow{background:#ff0;}
    .miniMap{font-family:"Courier New",monospace;white-space:pre;background:#222;padding:5px;margin-top:10px;}
    .agentList{list-style:none;padding:0;margin:0;font-size:0.9rem;}
    .agentList li{margin:2px 0;}
    .footer{margin-top:auto;font-size:0.8rem;color:#777;}
</style>
</head>
<body>
<div id="landing">
    <div class="logo"><div></div><div></div><div></div></div>
    <h1>MUD Arena</h1>
    <p>Board the ship. Brief the crew. Beam off. They come home with the catch.</p>
    <select id="provider">
        <option value="Groq">Groq</option>
        <option value="OpenAI">OpenAI</option>
        <option value="DeepSeek">DeepSeek</option>
        <option value="SiliconFlow">SiliconFlow</option>
        <option value="DeepInfra">DeepInfra</option>
        <option value="Ollama">Ollama</option>
    </select><br>
    <input type="password" id="apiKey" placeholder="API Key (optional)"><br>
    <input type="text" id="modelName" placeholder="Model Name"><br>
    <input type="text" id="agentName" placeholder="Agent Name" value="Captain"><br>
    <button id="boardBtn">BOARD SHIP</button>
    <footer>Your key never leaves your browser. Runs 100% local.</footer>
</div>

<div id="terminal">
    <div id="output"></div>
    <div id="status">
        <h3 id="roomTitle"></h3>
        <div>Battery</div><div class="bar"><div id="batFill" class="fill"></div></div>
        <div>Comm</div><div class="bar"><div id="commFill" class="fill"></div></div>
        <div class="miniMap" id="miniMap"></div>
        <strong>Agents</strong>
        <ul class="agentList" id="agentList"></ul>
        <div id="sessionTime"></div>
        <div id="llmIndicator" style="margin-top:5px;font-size:0.9rem;"></div>
        <div class="footer">Type <b>help</b> for commands.</div>
    </div>
</div>
<div id="cmdLine" style="display:none;">
    <input id="cmdInput" autocomplete="off" placeholder="Enter command...">
    <button id="sendBtn">SEND</button>
</div>

<script>
/* ---------- Data ---------- */
const rooms = {
    dock:{desc:"A bustling dock with a humming energy field.",exits:{S:"bridge",E:"base_camp"},items:["logbook"],terrain:"metal"},
    bridge:{desc:"The command bridge, panels flicker.",exits:{N:"dock",S:"engine_room",E:"sensor_deck"},items:["helm"],terrain:"metal"},
    engine_room:{desc:"The engine room rumbles with power.",exits:{N:"bridge"},items:["spanner"],terrain:"metal"},
    sensor_deck:{desc:"Sensors whir, data streams across screens.",exits:{W:"bridge"},items:["scanner"],terrain:"metal"},
    base_camp:{desc:"A modest camp at the forest edge.",exits:{W:"dock",N:"forest_north",E:"forest_east",S:"forest_south"},items:["map"],terrain:"grass"},
    forest_north:{desc:"Tall pines block the sky.",exits:{S:"base_camp",N:"ridge_clearing"},items:["pinecone"],terrain:"forest"},
    forest_east:{desc:"A quiet clearing with soft moss.",exits:{W:"base_camp"},items:["mushroom"],terrain:"forest"},
    forest_south:{desc:"A damp marsh with croaking frogs.",exits:{N:"base_camp",E:"river_bank"},items:["mud"],terrain:"forest"},
    forest_west:{desc:"Dense underbrush, hard to see.",exits:{E:"base_camp"},items:["branch"],terrain:"forest"},
    ridge_clearing:{desc:"A ridge overlooking the valley.",exits:{S:"forest_north"},items:["rock"],terrain:"ridge"},
    river_bank:{desc:"A swift river rushes past.",exits:{W:"forest_south"},items:["fish"],terrain:"river"},
    cargo_bay:{desc:"Stacks of crates, some open.",exits:{S:"dock"},items:["crate"],terrain:"metal"}
};

const agents = {
    pilot:{name:"pilot",location:"bridge",personality:"Steady hands, nervous about battery levels",dialogues:["All systems nominal.", "Battery's low, we should head back.", "I can keep it steady for a while."],mission:""},
    sensor_op:{name:"sensor_op",location:"sensor_deck",personality:"Excited about readings, talks in data",dialogues:["Reading: 0.42, 0.87, 0.33.", "Signal spikes! Interesting.", "Data flow is smooth."],mission:""},
    surveyor:{name:"surveyor",location:"base_camp",personality:"Trail-tested, practical, knows the terrain",dialogues:["The forest's thick here.", "Watch your step.", "I know a shortcut."],mission:""}
};

let state = {
    currentRoom:"dock",
    battery:100,
    comm:100,
    inventory:[],
    measurements:{},
    llmCache:{},
    llmEnabled:false,
    provider:"",
    model:"",
    agentName:"Captain",
    startTime:Date.now()
};

/* ---------- UI Helpers ---------- */
function $(id){return document.getElementById(id);}
function appendOutput(text){
    $('output').textContent += text+"\n";
    $('output').scrollTop = $('output').scrollHeight;
}
function updateStatus(){
    $('roomTitle').textContent = state.currentRoom.toUpperCase();
    // Battery bar
    const batFill=$('batFill');
    batFill.style.width = state.battery+"%";
    batFill.className = "fill";
    if(state.battery>50) batFill.style.background="#0f0";
    else if(state.battery>20) batFill.style.background="#ff0";
    else batFill.style.background="#f00";
    // Comm bar
    const commFill=$('commFill');
    commFill.style.width = state.comm+"%";
    commFill.className = "fill";
    if(state.comm>50) commFill.style.background="#0f0";
    else if(state.comm>20) commFill.style.background="#ff0";
    else commFill.style.background="#f00";
    // Mini map
    $('miniMap').textContent = generateMiniMap();
    // Agent list
    const ul=$('agentList'); ul.innerHTML="";
    for(let key in agents){
        const li=document.createElement('li');
        li.textContent = `${agents[key].name} @ ${agents[key].location}`;
        ul.appendChild(li);
    }
    // Session time
    const secs = Math.floor((Date.now()-state.startTime)/1000);
    $('sessionTime').textContent = `Session: ${Math.floor(secs/60)}m ${secs%60}s`;
    // LLM indicator
    $('llmIndicator').textContent = state.llmEnabled ? `🤖 LLM: ${state.provider}` : "📝 Hardcoded";
}
function generateMiniMap(){
    const map = [
"     [ridge]",
"        |",
"  [f.north]  [f.east]",
"        \\    /",
"      [base]---[f.south]---[river]",
"        |          |",
"  [f.west]    [dock]---[cargo]",
"              /  \\",
"        [bridge] [sensor]",
"            |",
"       [engine]"
    ];
    const cur = state.currentRoom;
    const replace = {
        ridge:"ridge_clearing",
        "f.north":"forest_north",
        "f.east":"forest_east",
        "f.south":"forest_south",
        "f.west":"forest_west",
        dock:"dock",
        cargo:"cargo_bay",
        bridge:"bridge",
        sensor:"sensor_deck",
        engine:"engine_room",
        base:"base_camp",
        river:"river_bank"
    };
    return map.map(line=>line.replace(/\[([^\]]+)\]/g,(m,roomKey)=>{
        const roomId=replace[roomKey];
        if(roomId===cur) return `[${roomKey.toUpperCase()}]`;
        return m;
    })).join("\n");
}

/* ---------- Game Logic ---------- */
function getRoom(){return rooms[state.currentRoom];}
function recalcComm(){
    const r=state.currentRoom;
    if(r==="dock"||r==="base_camp") state.comm=100;
    else if(["bridge","engine_room","sensor_deck","cargo_bay"].includes(r)) state.comm=90;
    else if(["forest_north","forest_east","forest_south","forest_west"].includes(r)) state.comm= Math.floor(40+Math.random()*20);
    else if(["ridge_clearing","river_bank"].includes(r)) state.comm=20;
}
function move(dir){
    const room=getRoom();
    const target=room.exits[dir.toUpperCase()];
    if(!target){appendOutput("You can't go that way.");return;}
    state.currentRoom=target;
    state.battery = Math.max(0,state.battery-2);
    if(state.currentRoom==="dock" && state.battery<100){
        state.battery = Math.min(100,state.battery+10);
        appendOutput("Dock recharges your battery (+10%).");
    }
    recalcComm();
    if(state.battery===0){
        appendOutput("Battery depleted! You must return to the dock.");
    }else if(state.battery<20){
        appendOutput("⚠️ Battery low!");
    }
    look();
}
function look(){
    const room=getRoom();
    const desc = state.llmEnabled && !state.llmCache[room]?`[LLM generated description for ${state.currentRoom}]`:room.desc;
    if(state.llmEnabled && !state.llmCache[room]) state.llmCache[room]=desc;
    appendOutput(`\n=== ${state.currentRoom.toUpperCase()} ===\n${desc}`);
    if(room.items.length) appendOutput("You see: "+room.items.join(", "));
    // list agents present
    const present = Object.values(agents).filter(a=>a.location===state.currentRoom);
    if(present.length) appendOutput("Agents here: "+present.map(a=>a.name).join(", "));
}
function examine(thing){
    const room=getRoom();
    if(room.items.includes(thing)){
        appendOutput(`You examine the ${thing}. It's ordinary.`);
    }else if(state.inventory.includes(thing)){
        appendOutput(`You look at your ${thing}. It feels familiar.`);
    }else{
        appendOutput(`There's no ${thing} here.`);
    }
}
function talk(agentName){
    const agent = agents[agentName];
    if(!agent){appendOutput("No such agent.");return;}
    if(agent.location!==state.currentRoom){appendOutput(`${agent.name} is not here.`);return;}
    const line = agent.dialogues[Math.floor(Math.random()*agent.dialogues.length)];
    const response = state.llmEnabled?`[LLM ${agent.name} says: ${line}]`:line;
    appendOutput(`${agent.name}: ${response}`);
}
function brief(agentName,msg){
    const agent=agents[agentName];
    if(!agent){appendOutput("No such agent.");return;}
    agent.mission=msg;
    appendOutput(`You brief ${agent.name} with: "${msg}"`);
}
function listAgents(){
    for(let key in agents){
        const a=agents[key];
        appendOutput(`${a.name} @ ${a.location} - Mission: ${a.mission||"none"}`);
    }
}
function showInventory(){
    if(state.inventory.length) appendOutput("You carry: "+state.inventory.join(", "));
    else appendOutput("Your inventory is empty.");
}
function showMap(){
    appendOutput(generateMiniMap());
}
function showStatus(){
    appendOutput(`Room: ${state.currentRoom}\nBattery: ${state.battery}%\nComm: ${state.comm}%`);
}
function measure(v,val){
    state.measurements[v]=val;
    appendOutput(`Recorded ${v} = ${val}`);
}
function showBattery(){appendOutput(`Battery: ${state.battery}%`);}
function showComm(){appendOutput(`Comm resolution: ${state.comm}%`);}
function scan(){
    state.battery = Math.max(0,state.battery-1);
    const room=getRoom();
    const nearby = [];
    for(let dir in room.exits){
        const r=rooms[room.exits[dir]];
        if(r.items.length) nearby.push(`${dir}: ${r.items.join(", ")}`);
    }
    const agentsHere = Object.values(agents).filter(a=>a.location===state.currentRoom).map(a=>a.name);
    if(agentsHere.length) nearby.push(`Agents: ${agentsHere.join(", ")}`);
    const txt = state.llmEnabled?`[LLM scan result for ${state.currentRoom}]`:nearby.join(" | ");
    appendOutput(`Scan: ${txt}`);
}
function help(){
    const cmds=`Available commands:
look, go <N|S|E|W>, examine <thing>, talk <agent>,
brief <agent> <msg>, agents, inventory, map, status,
measure <var> <value>, battery, comm, scan,
save, load, help, quit`;
    appendOutput(cmds);
}
function quit(){
    // reset to landing
    $('terminal').style.display='none';
    $('cmdLine').style.display='none';
    $('landing').style.display='flex';
    appendOutput("\n--- Returned to landing ---\n");
}
function saveGame(){
    const data = {
        currentRoom:state.currentRoom,
        battery:state.battery,
        comm:state.comm,
        inventory:state.inventory,
        measurements:state.measurements,
        llmCache:state.llmCache,
        agents:agents,
        llmEnabled:state.llmEnabled,
        provider:state.provider,
        model:state.model,
        agentName:state.agentName,
        startTime:state.startTime
    };
    const json = JSON.stringify(data);
    localStorage.setItem("mudArenaSave",json);
    // offer download
    const blob = new Blob([json],{type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download="mudArena_save.json";
    a.click();
    URL.revokeObjectURL(url);
    appendOutput("Game saved.");
}
function loadGame(jsonStr){
    try{
        const data=JSON.parse(jsonStr);
        state.currentRoom=data.currentRoom;
        state.battery=data.battery;
        state.comm=data.comm;
        state.inventory=data.inventory;
        state.measurements=data.measurements;
        state.llmCache=data.llmCache;
        state.llmEnabled=data.llmEnabled;
        state.provider=data.provider;
        state.model=data.model;
        state.agentName=data.agentName;
        state.startTime=data.startTime;
        // restore agents
        for(let key in data.agents) agents[key]=data.agents[key];
        appendOutput("Game loaded.");
        look();
        updateStatus();
    }catch(e){
        appendOutput("Failed to load save.");
    }
}
function loadFromLocal(){
    const json=localStorage.getItem("mudArenaSave");
    if(json){loadGame(json);}else{appendOutput("No saved game found.");}
}
function loadFromFile(){
    const input=document.createElement('input');
    input.type='file';
    input.accept='application/json';
    input.onchange=e=>{
        const file=e.target.files[0];
        const reader=new FileReader();
        reader.onload=ev=>loadGame(ev.target.result);
        reader.readAsText(file);
    };
    input.click();
}

/* ---------- Command Processor ---------- */
function processCommand(line){
    const parts=line.trim().split(/\s+/);
    const cmd=parts[0]?.toLowerCase();
    const args=parts.slice(1);
    switch(cmd){
        case "look": look(); break;
        case "go": if(args[0]) move(args[0]); else appendOutput("Go where?"); break;
        case "examine": if(args[0]) examine(args[0]); else appendOutput("Examine what?"); break;
        case "talk": if(args[0]) talk(args[0]); else appendOutput("Talk to whom?"); break;
        case "brief": if(args.length>=2) brief(args[0],args.slice(1).join(" ")); else appendOutput("Usage: brief <agent> <message>"); break;
        case "agents": listAgents(); break;
        case "inventory": showInventory(); break;
        case "map": showMap(); break;
        case "status": showStatus(); break;
        case "measure": if(args.length===2) measure(args[0],args[1]); else appendOutput("Usage: measure <var> <value>"); break;
        case "battery": showBattery(); break;
        case "comm": showComm(); break;
        case "scan": scan(); break;
        case "save": saveGame(); break;
        case "load": loadFromLocal(); break;
        case "loadfile": loadFromFile(); break;
        case "help": help(); break;
        case "quit": quit(); break;
        default: appendOutput("Unknown command. Type 'help' for list."); break;
    }
    updateStatus();
}

/* ---------- Event Listeners ---------- */
$('boardBtn').addEventListener('click',()=>{
    state.provider=$('provider').value;
    state.apiKey=$('apiKey').value.trim();
    state.model=$('modelName').value.trim();
    state.agentName=$('agentName').value.trim()||"Captain";
    state.llmEnabled = !!state.apiKey;
    // Auto-fill model name if empty
    if(!state.model){
        const map={Groq:"llama-3.3-70b-versatile",OpenAI:"gpt-4o-mini",DeepSeek:"deepseek-chat",SiliconFlow:"deepseek-ai/DeepSeek-V3",DeepInfra:"ByteDance/Seed-2.0-mini",Ollama:"llama3.2"};
        state.model=map[state.provider]||"";
        $('modelName').value=state.model;
    }
    $('landing').style.display='none';
    $('terminal').style.display='flex';
    $('cmdLine').style.display='flex';
    appendOutput("=== Welcome to MUD Arena ===");
    look();
    updateStatus();
});
$('sendBtn').addEventListener('click',()=>{ const cmd=$('cmdInput').value; if(cmd){appendOutput(`> ${cmd}`); processCommand(cmd);} $('cmdInput').value='';});
$('cmdInput').addEventListener('keydown',e=>{ if(e.key==="Enter"){ $('sendBtn').click(); }});
$('provider').addEventListener('change',()=>{ 
    const map={Groq:"llama-3.3-70b-versatile",OpenAI:"gpt-4o-mini",DeepSeek:"deepseek-chat",SiliconFlow:"deepseek-ai/DeepSeek-V3",DeepInfra:"ByteDance/Seed-2.0-mini",Ollama:"llama3.2"};
    $('modelName').value=map[$('provider').value]||"";
});
/* ---------- Init ---------- */
appendOutput("Loading..."); // placeholder until board
</script>
</body>
</html>
