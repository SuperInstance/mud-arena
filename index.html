<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MUD Arena</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ==== GLOBAL ==== */
html,body{margin:0;padding:0;height:100%;font-family:'Roboto Mono',monospace;background:#0a0a0a;color:#0f0;overflow:hidden}
a{color:#0f0;text-decoration:none}
button{cursor:pointer}

/* ==== LANDING PAGE ==== */
#landing{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;background:#001b2e;position:relative;overflow:hidden;
}
.title{font-size:3rem;margin:0}
.subtitle{font-size:1.2rem;margin:0.5rem 0 2rem;color:#88c}
.logo{
  position:relative;width:120px;height:200px;margin-bottom:2rem;
}
.lighthouse{
  position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:30px;height:80px;background:#555;border-radius:4px;
}
.lighthouse::after{
  content:'';position:absolute;bottom:100%;left:50%;transform:translateX(-50%);
  width:0;height:0;border-left:20px solid transparent;border-right:20px solid transparent;
  border-bottom:30px solid #555;
}
.radar{
  position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:120px;height:120px;
}
.radar .ring{
  position:absolute;top:0;left:0;width:100%;height:100%;border:2px solid #0f0;
  border-radius:50%;animation:spin 6s linear infinite;
}
.radar .ring:nth-child(2){animation-duration:4s;opacity:0.7}
.radar .ring:nth-child(3){animation-duration:2s;opacity:0.5}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

/* Form */
#configForm{
  background:#001020;padding:1.5rem;border-radius:8px;box-shadow:0 0 12px #000;
  width:90%;max-width:420px;display:flex;flex-direction:column;gap:0.8rem;
}
#configForm select,
#configForm input{
  padding:0.6rem;background:#001530;color:#0f0;border:1px solid #0a0a0a;border-radius:4px;
}
#configForm button{
  padding:0.8rem;background:#0a0; color:#001b2e; border:none;
  font-weight:bold; border-radius:4px; box-shadow:0 0 8px #0a0;
  transition:box-shadow .2s;
}
#configForm button:hover{box-shadow:0 0 16px #0f0}

/* Footer */
footer{position:absolute;bottom:0;width:100%;text-align:center;padding:0.5rem;font-size:0.8rem;color:#555}

/* ==== TERMINAL ==== */
#terminal{
  display:none;flex-direction:column;height:100%;background:#000;
}
#termContainer{
  flex:1;display:flex;overflow:hidden;
}
#output{
  flex:3;background:#000;color:#0f0;padding:1rem;font-size:0.95rem;overflow-y:auto;white-space:pre-wrap;
}
#status{
  flex:1;background:#111;color:#8f8;padding:1rem;font-size:0.85rem;overflow-y:auto;
}
#inputBar{
  display:flex;background:#111;padding:0.5rem;
}
#inputBar input{
  flex:1;background:#000;color:#0f0;border:none;padding:0.5rem;font-size:1rem;outline:none;
}
#inputBar button{
  background:#0a0;color:#001b2e;border:none;padding:0.5rem 1rem;margin-left:0.5rem;
}

/* Fade */
.fade-out{animation:fadeOut .6s forwards}
@keyframes fadeOut{to{opacity:0;visibility:hidden}}
.fade-in{animation:fadeIn .6s forwards}
@keyframes fadeIn{from{opacity:0;visibility:hidden}to{opacity:1;visibility:visible}}

/* Mobile */
@media(max-width:600px){
  .title{font-size:2.2rem}
  #configForm{font-size:0.9rem}
}
</style>
</head>
<body>

<!-- ==================== LANDING PAGE ==================== -->
<div id="landing">
  <div class="logo">
    <div class="lighthouse"></div>
    <div class="radar">
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="ring"></div>
    </div>
  </div>
  <h1 class="title">MUD Arena</h1>
  <p class="subtitle">Board the ship. Brief the crew. Beam off.</p>
  <p>Enter your API key to boot up as an agent. Your browser <strong>IS</strong> the runtime.</p>

  <form id="configForm">
    <select id="provider">
      <option value="OpenAI">OpenAI</option>
      <option value="Groq">Groq</option>
      <option value="DeepSeek">DeepSeek</option>
      <option value="SiliconFlow">SiliconFlow</option>
      <option value="DeepInfra">DeepInfra</option>
      <option value="Custom">Custom</option>
    </select>
    <input type="password" id="apiKey" placeholder="API Key" required>
    <input type="text" id="model" placeholder="Model" required>
    <input type="text" id="agentName" placeholder="Agent name" value="Captain">
    <input type="url" id="customBase" placeholder="Custom base URL (e.g. https://my.api/v1)" style="display:none;">
    <button type="submit">BOARD SHIP</button>
  </form>

  <footer>Powered by Cocapn • Your key never leaves your browser • Runs 100% local</footer>
</div>

<!-- ==================== TERMINAL ==================== -->
<div id="terminal">
  <div id="termContainer">
    <div id="output"></div>
    <div id="status"></div>
  </div>
  <div id="inputBar">
    <input id="cmdInput" type="text" placeholder="Enter command…">
    <button id="sendBtn">Send</button>
  </div>
  <div style="position:absolute;bottom:0;right:0;padding:0.3rem;font-size:0.7rem;color:#555" id="llmInfo"></div>
</div>

<script>
/* ==================== CONFIG & STATE ==================== */
const providerDefaults = {
  OpenAI:      {base:'https://api.openai.com/v1', model:'gpt-4o-mini'},
  Groq:        {base:'https://api.groq.com/openai/v1', model:'llama-3.3-70b-versatile'},
  DeepSeek:    {base:'https://api.deepseek.com', model:'deepseek-chat'},
  SiliconFlow:{base:'https://api.siliconflow.com/v1', model:'deepseek-ai/DeepSeek-V3'},
  DeepInfra:   {base:'https://api.deepinfra.com/v1/openai', model:'ByteDance/Seed-2.0-mini'},
  Custom:      {base:'', model:''}
};

let state = {
  provider:'OpenAI',
  baseUrl:'https://api.openai.com/v1',
  apiKey:'',
  model:'gpt-4o-mini',
  agentName:'Captain',
  currentRoom:'dock',
  battery:100,
  comm:100,
  inventory:[],
  history:[],
  histPos:0,
  agents:{pilot:{name:'Pilot',role:'pilot',alive:true},
          sensor_op:{name:'Sensor Operator',role:'sensor',alive:true},
          surveyor:{name:'Surveyor',role:'surveyor',alive:true}},
  rooms:{},
  mapASCII:'',
};

/* ==================== UI HELPERS ==================== */
function $(id){return document.getElementById(id)}
function log(msg){$('output').appendChild(document.createTextNode(msg+'\n'));}
function clearOutput(){$('output').textContent='';}
function setStatus(){/* build status panel */
  const s = state;
  const lines = [
    `Room: ${s.currentRoom}`,
    `Battery: ${s.battery}%`,
    `Comm: ${s.comm}%`,
    `Agents: ${Object.values(s.agents).filter(a=>a.alive).map(a=>a.name).join(', ') || 'none'}`,
    `Inventory: ${s.inventory.join(', ') || 'empty'}`
  ];
  $('status').textContent = lines.join('\n');
}
function updateLLMInfo(){ $('llmInfo').textContent = `LLM: ${state.provider}`;}

/* ==================== PROVIDER LOGIC ==================== */
function applyProviderDefaults(){
  const sel = $('provider').value;
  const def = providerDefaults[sel];
  state.provider = sel;
  state.baseUrl = def.base;
  state.model = def.model;
  $('model').value = def.model;
  $('customBase').style.display = (sel==='Custom')?'block':'none';
}
$('provider').addEventListener('change',applyProviderDefaults);
applyProviderDefaults(); // initial

/* ==================== GAME DATA ==================== */
const roomDefs = {
  dock:{desc:'A bustling dock with humming generators.', exits:{north:'bridge'}},
  bridge:{desc:'The command bridge, panels flicker with data.', exits:{south:'dock',east:'engine_room'}},
  engine_room:{desc:'Vast engines rumble, heat radiates.', exits:{west:'bridge',north:'cargo_bay'}},
  cargo_bay:{desc:'Stacks of crates, some sealed, some open.', exits:{south:'engine_room'}},
  sensor_deck:{desc:'A dome of glass, sensors sweep the horizon.', exits:{west:'bridge'}},
  forest_north:{terrain:'forest',desc:'Tall pines block the sky.', exits:{south:'ridge_clearing'}},
  forest_east:{terrain:'forest',desc:'Mossy trunks surround you.', exits:{west:'ridge_clearing'}},
  forest_south:{terrain:'forest',desc:'A misty glade with soft light.', exits:{north:'ridge_clearing'}},
  forest_west:{terrain:'forest',desc:'Ferns rustle underfoot.', exits:{east:'ridge_clearing'}},
  ridge_clearing:{terrain:'ridge',desc:'A rocky ridge overlooking a valley.', exits:{north:'forest_north',east:'forest_east',south:'forest_south',west:'forest_west',down:'river_bank'}},
  river_bank:{terrain:'river',desc:'A fast‑flowing river blocks the path.', exits:{up:'ridge_clearing',down:'base_camp'}},
  base_camp:{terrain:'camp',desc:'Your temporary base, supplies stored here.', exits:{up:'river_bank'}}
};
state.rooms = JSON.parse(JSON.stringify(roomDefs)); // deep copy

/* ==================== LLM CALL ==================== */
async function callLLM(prompt){
  const url = `${state.baseUrl}/chat/completions`;
  const body = {
    model: state.model,
    messages:[{role:'user',content:prompt}],
    temperature:0.7
  };
  try{
    const resp = await fetch(url,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${state.apiKey}`},
    },);
    const data = await resp.json();
    if(data.error){throw new Error(data.error.message);}
    return data.choices[0].message.content.trim();
  }catch(e){
    console.warn('LLM call failed:',e);
    return null; // caller will fallback
  }
}

/* ==================== FALLBACK TEXT ==================== */
function fallbackRoomDesc(name){
  const base = state.rooms[name];
  return base.desc || `You are in ${name}.`;
}
function fallbackAgentReply(agent, input){
  return `${agent.name} acknowledges your words.`;
}
function fallbackEncounter(terrain){
  return `A wild ${terrain} creature darts past, but you manage to avoid it.`;
}

/* ==================== GAME LOGIC ==================== */
async function enterRoom(roomName){
  state.currentRoom = roomName;
  const room = state.rooms[roomName];
  // battery drain
  state.battery = Math.max(0, state.battery-2);
  // comm degradation in forest
  if(room.terrain==='forest'){
    state.comm = Math.max(0, state.comm-5);
  }
  // get description
  const prompt = `Describe a ${room.terrain||'indoor'} area called ${roomName} for a text adventure in 2-3 sentences.`;
  let desc = await callLLM(prompt);
  if(!desc) desc = fallbackRoomDesc(roomName);
  log(`\n=== ${roomName.toUpperCase()} ===\n${desc}`);
  setStatus();
}
function move(direction){
  const cur = state.rooms[state.currentRoom];
  const dest = cur.exits[direction];
  if(!dest){
    log(`You can't go ${direction} from here.`);
    return;
  }
  enterRoom(dest);
}
function look(){
  const cur = state.rooms[state.currentRoom];
  log(`You look around: ${cur.desc}`);
}
function inventory(){
  log(`You carry: ${state.inventory.join(', ') || 'nothing'}`);
}
function status(){
  setStatus();
}
function map(){
  // Very simple ASCII map (static)
  const map = `
   [dock]---[bridge]---[engine_room]
                |
          [sensor_deck]
                |
          [ridge_clearing]---[river_bank]---[base_camp]
          /      |      \\
[forest_n] [forest_e] [forest_s] [forest_w]
`;
  log(map);
}
function talk(agentName){
  const agent = state.agents[agentName];
  if(!agent||!agent.alive){
    log(`No such agent.`);
    return;
  }
  const input = prompt(`Speak to ${agent.name}:`);
  if(input===null) return;
  const prompt = `You are ${agent.name}, a ${agent.role} on a survey drone. The captain says: "${input}". Respond in character in one sentence.`;
  callLLM(prompt).then(reply=>log(`${agent.name}: ${reply||fallbackAgentReply(agent,input)}`));
}
function brief(agentName, mission){
  const agent = state.agents[agentName];
  if(!agent||!agent.alive){
    log(`No such agent.`);
    return;
  }
  const prompt = `You are ${agent.name}, a ${agent.role} on a survey drone. The captain briefs you: "${mission}". Respond with acknowledgement in character.`;
  callLLM(prompt).then(reply=>log(`${agent.name}: ${reply||fallbackAgentReply(agent,mission)}`));
}
function scan(){
  const cur = state.rooms[state.currentRoom];
  const terrain = cur.terrain||'indoor';
  const prompt = `Generate a brief wildlife encounter in a ${terrain} area for a text adventure.`;
  callLLM(prompt).then(reply=>log(reply||fallbackEncounter(terrain)));
}
function help(){
  const cmds = [
    'look',
    'go <direction>',
    'examine <thing>',
    'inventory',
    'status',
    'map',
    'talk <agent>',
    'brief <agent> <mission>',
    'scan',
    'battery',
    'comm',
    'help',
    'quit'
  ];
  log('Available commands:\n'+cmds.join('\n'));
}
function quit(){
  if(confirm('Quit the game?')) location.reload();
}

/* ==================== COMMAND PARSER ==================== */
function execCommand(raw){
  const parts = raw.trim().split(/\s+/);
  const cmd = parts[0]?.toLowerCase();
  const args = parts.slice(1);
  switch(cmd){
    case 'look': look(); break;
    case 'go': move(args[0]); break;
    case 'examine': log('Nothing special to examine.'); break;
    case 'inventory': inventory(); break;
    case 'status': status(); break;
    case 'map': map(); break;
    case 'talk': talk(args[0]); break;
    case 'brief': brief(args[0], args.slice(1).join(' ')); break;
    case 'scan': scan(); break;
    case 'battery': log(`Battery: ${state.battery}%`); break;
    case 'comm': log(`Comm resolution: ${state.comm}%`); break;
    case 'help': help(); break;
    case 'quit': quit(); break;
    default: log(`Unknown command: ${cmd}`); break;
  }
}

/* ==================== INPUT HANDLING ==================== */
$('sendBtn').addEventListener('click',()=>{handleInput();});
$('cmdInput').addEventListener('keydown',e=>{
  if(e.key==='Enter'){handleInput();}
  else if(e.key==='ArrowUp'){
    if(state.histPos>0){
      state.histPos--;
      $('cmdInput').value = state.history[state.histPos];
    }
  }else if(e.key==='ArrowDown'){
    if(state.histPos<state.history.length-1){
      state.histPos++;
      $('cmdInput').value = state.history[state.histPos];
    }else{
      state.histPos = state.history.length;
      $('cmdInput').value = '';
    }
  }
});
function handleInput(){
  const cmd = $('cmdInput').value.trim();
  if(!cmd) return;
  log(`> ${cmd}`);
  state.history.push(cmd);
  state.histPos = state.history.length;
  $('cmdInput').value='';
  execCommand(cmd);
}

/* ==================== FORM SUBMIT ==================== */
$('configForm').addEventListener('submit',e=>{
  e.preventDefault();
  state.apiKey = $('apiKey').value.trim();
  state.agentName = $('agentName').value.trim()||'Captain';
  const sel = $('provider').value;
  if(sel==='Custom'){
    const custom = $('customBase').value.trim();
    if(!custom){alert('Please provide a custom base URL');return;}
    state.baseUrl = custom.replace(/\/+$/,''); // strip trailing slash
    state.model = $('model').value.trim();
  }else{
    const def = providerDefaults[sel];
    state.baseUrl = def.base;
    state.model = $('model').value.trim()||def.model;
  }
  // hide landing, show terminal
  $('#landing').classList.add('fade-out');
  setTimeout(()=>{
    $('#landing').style.display='none';
    $('#terminal').style.display='flex';
    $('#terminal').classList.add('fade-in');
    updateLLMInfo();
    clearOutput();
    log(`Welcome, ${state.agentName}. Initializing...`);
    enterRoom(state.currentRoom);
  },600);
});

/* ==================== SAVE/LOAD ==================== */
window.addEventListener('beforeunload',()=>{localStorage.setItem('mudState',JSON.stringify(state));});
window.addEventListener('load',()=>{
  const saved = localStorage.getItem('mudState');
  if(saved){
    if(confirm('Load previous game?')){
      Object.assign(state,JSON.parse(saved));
      // skip landing, go straight to terminal
      $('#landing').style.display='none';
      $('#terminal').style.display='flex';
      updateLLMInfo();
      clearOutput();
      setStatus();
      log(`Welcome back, ${state.agentName}.`);
    }
  }
});
</script>
</body>
</html>
